info:
  name: Create Category
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{base_url}}/graphql"
  body:
    query: |-
      mutation CreateCategory($data: CreateCategoryInput!) {
        createCategory(data: $data) {
          title
          description
          icon
          color
          user {
            id
            name
            email
          }
        }
      }
