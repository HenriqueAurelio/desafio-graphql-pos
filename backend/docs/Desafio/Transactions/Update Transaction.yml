info:
  name: Update Transaction
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{base_url}}/graphql"
  body:
    query: |-
      mutation UpdateTransaction($id: String!, $data: UpdateTransactionInput!) {
        updateTransaction(id: $id, data: $data) {
          id
          name
          amount
          type
          date
          userId
          categoryId
          category {
            id
            title
            icon
            color
          }
          createdAt
          updatedAt
        }
      }
    variables: |-
      {
        "id": "cc7932f2-2203-451f-816e-16a4a67e4b52",
        "data": {
          "name": "Almoço Atualizado",
          "amount": 50.00,
          "type": "EXPENSE",
          "date": "2026-03-28T13:00:00.000Z"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
