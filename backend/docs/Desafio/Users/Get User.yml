info:
  name: Get User
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{base_url}}/graphql"
  body:
    query: |-
      mutation Register($data: RegisterInput!) {
        register(data: $data) {
          token
          refreshToken
          user {
            id
            name
            email
            password
          }
        }
      }
    variables: |-
      {
        "data": {
          "email": "henrique@teste.com.br",
          "name": "Henrique",
          "password": "123456"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
